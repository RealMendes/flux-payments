services:
  nginx:
    image: nginx:alpine
    container_name: flux-payments-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - flux-network

  php:
    build: .
    container_name: flux-payments-app
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - "9000"
    networks:
      - flux-network
  db:
    image: mysql:8.0
    container_name: flux-payments-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - flux-network

  redis:
    image: redis:7-alpine
    container_name: flux-payments-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - flux-network

volumes:
  db_data:
  redis_data:

networks:
  flux-network:
    driver: bridge
